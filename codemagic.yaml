# iOS testing: see docs/IOS_TESTING.md for Codemagic + Sideloadly steps.
workflows:
  ios-sideloadly:
    name: iOS (IPA for Sideloadly)
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # IMPORTANT: Do NOT include /api in API_BASE. The app adds /api itself.
        # Render server: https://carr-5hrm.onrender.com
        API_BASE: "https://carr-5hrm.onrender.com"
        FORCE_SKIP_BLUR: "false"
      # Configure these in Codemagic UI (Environment variables / Secure):
      # - IOS_GOOGLE_MAPS_API_KEY  (iOS Maps SDK key, restricted to bundle id com.carzo.app)
      # - ANDROID_GOOGLE_MAPS_API_KEY (Android Maps SDK key, restricted by package + SHA-1)
    cache:
      cache_paths:
        - "$FLUTTER_ROOT/.pub-cache"
        - "~/.pub-cache"
    scripts:
      - name: Flutter version
        script: flutter --version
      - name: Clean + pub get
        script: |
          flutter clean
          flutter pub get
      - name: Sideloadly compatibility (ATS + entitlements)
        script: |
          # Allow HTTP for LAN testing when API_BASE is http://...
          /usr/libexec/PlistBuddy -c 'Set :NSAppTransportSecurity:NSAllowsArbitraryLoads bool YES' ios/Runner/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c 'Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool YES' ios/Runner/Info.plist 2>/dev/null || true
          # Remove capabilities that can break Sideloadly installs (ignore if file missing)
          for key in com.apple.security.application-groups keychain-access-groups aps-environment; do
            /usr/libexec/PlistBuddy -c "Delete :$key" ios/Runner/Runner.entitlements 2>/dev/null || true
          done
          /usr/libexec/PlistBuddy -c 'Delete :UIBackgroundModes' ios/Runner/Info.plist 2>/dev/null || true
      - name: Inject iOS Google Maps key (CI)
        script: |
          if [ -n "$IOS_GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting GMSApiKey into Info.plist and Info-Debug.plist"
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $IOS_GOOGLE_MAPS_API_KEY" ios/Runner/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :GMSApiKey string $IOS_GOOGLE_MAPS_API_KEY" ios/Runner/Info.plist 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :GMSApiKey $IOS_GOOGLE_MAPS_API_KEY" ios/Runner/Info-Debug.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Add :GMSApiKey string $IOS_GOOGLE_MAPS_API_KEY" ios/Runner/Info-Debug.plist 2>/dev/null || true
          else
            echo "IOS_GOOGLE_MAPS_API_KEY not set; maps will fail/blank on iOS builds."
          fi
      - name: Analyze + tests
        script: |
          flutter analyze
          flutter test --dart-define=API_BASE=http://127.0.0.1:8081
      - name: Build iOS app (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=SIDELOAD_BUILD=true \
            --dart-define=API_BASE="$API_BASE" \
            --dart-define=FORCE_SKIP_BLUR="$FORCE_SKIP_BLUR"
      - name: Package unsigned IPA for Sideloadly
        script: |
          set -e
          DEST_DIR="$CM_BUILD_DIR/build/ios/ipa"
          mkdir -p "$DEST_DIR"
          APP_SRC="$CM_BUILD_DIR/build/ios/iphoneos/Runner.app"
          if [ ! -d "$APP_SRC" ]; then
            echo "Runner.app not found at $APP_SRC"
            ls -la "$CM_BUILD_DIR/build/ios" || true
            exit 1
          fi
          TMP_DIR=$(mktemp -d)
          mkdir -p "$TMP_DIR/Payload"
          cp -R "$APP_SRC" "$TMP_DIR/Payload/Runner.app"
          (cd "$TMP_DIR" && zip -qry Runner-unsigned.ipa Payload)
          mv "$TMP_DIR/Runner-unsigned.ipa" "$DEST_DIR/Runner-unsigned.ipa"
          echo "Built IPA: $DEST_DIR/Runner-unsigned.ipa — use with Sideloadly on your iPhone."
    artifacts:
      - build/ios/ipa/*.ipa

  android_release_unsigned:
    name: Android APK (release, unsigned)
    environment:
      flutter: stable
      vars:
        # IMPORTANT: Do NOT include /api in API_BASE. The app adds /api itself.
        # Release builds enforce HTTPS. Override in Codemagic UI.
        API_BASE: "https://api.example.com"
    scripts:
      - name: Flutter pub get
        script: |
          flutter --version
          flutter pub get
      - name: Build APK
        script: |
          flutter build apk --release --dart-define=API_BASE=${API_BASE}
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  android-dev-debug:
    name: Android (dev) - Debug
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        FLAVOR: dev
        # Debug builds may use HTTP for local development.
        API_BASE: "http://10.0.2.2:5003"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Inject Android Google Maps key (CI)
        script: |
          if [ -n "$ANDROID_GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting GOOGLE_MAPS_API_KEY into android/local.properties"
            touch android/local.properties
            if grep -q "^GOOGLE_MAPS_API_KEY=" android/local.properties; then
              sed -i.bak "s/^GOOGLE_MAPS_API_KEY=.*/GOOGLE_MAPS_API_KEY=$ANDROID_GOOGLE_MAPS_API_KEY/" android/local.properties
            else
              echo "" >> android/local.properties
              echo "GOOGLE_MAPS_API_KEY=$ANDROID_GOOGLE_MAPS_API_KEY" >> android/local.properties
            fi
          else
            echo "ANDROID_GOOGLE_MAPS_API_KEY not set; maps will fail/blank on Android builds."
          fi
      - name: Analyze
        script: flutter analyze
      - name: Tests
        script: flutter test --no-pub --dart-define=API_BASE=http://127.0.0.1:8081
      - name: Build APK (debug)
        script: flutter build apk --debug --no-pub --flavor "$FLAVOR"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  android-prod-release:
    name: Android (prod) - Release APK/AAB
    max_build_duration: 90
    instance_type: linux_x2
    environment:
      flutter: stable
      vars:
        FLAVOR: prod
        # IMPORTANT: Do NOT include /api in API_BASE. The app adds /api itself.
        # Release builds require HTTPS.
        API_BASE: "https://api.example.com"
      # Configure these in Codemagic UI (Environment variables / Secure):
      # - CM_KEYSTORE (base64 of your .jks)
      # - CM_KEYSTORE_PASSWORD
      # - CM_KEY_ALIAS
      # - CM_KEY_PASSWORD
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/.gradle/wrapper
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Inject Android Google Maps key (CI)
        script: |
          if [ -n "$ANDROID_GOOGLE_MAPS_API_KEY" ]; then
            echo "Injecting GOOGLE_MAPS_API_KEY into android/local.properties"
            touch android/local.properties
            if grep -q "^GOOGLE_MAPS_API_KEY=" android/local.properties; then
              sed -i.bak "s/^GOOGLE_MAPS_API_KEY=.*/GOOGLE_MAPS_API_KEY=$ANDROID_GOOGLE_MAPS_API_KEY/" android/local.properties
            else
              echo "" >> android/local.properties
              echo "GOOGLE_MAPS_API_KEY=$ANDROID_GOOGLE_MAPS_API_KEY" >> android/local.properties
            fi
          else
            echo "ANDROID_GOOGLE_MAPS_API_KEY not set; maps will fail/blank on Android builds."
          fi
      - name: Write Android signing files (optional)
        script: |
          if [ -n "$CM_KEYSTORE" ]; then
            echo "Signing config detected; writing keystore + signing.properties"
            KEYSTORE_PATH="$CM_BUILD_DIR/android/upload-keystore.jks"
            echo "$CM_KEYSTORE" | base64 --decode > "$KEYSTORE_PATH"
            # rootProject in app/build.gradle.kts is android/, so signing.properties goes there
            printf 'STORE_FILE=%s\nSTORE_PASSWORD=%s\nKEY_ALIAS=%s\nKEY_PASSWORD=%s\n' \
              "$KEYSTORE_PATH" "$CM_KEYSTORE_PASSWORD" "$CM_KEY_ALIAS" "$CM_KEY_PASSWORD" \
              > "$CM_BUILD_DIR/android/signing.properties"
          else
            echo "No signing env vars set; building a release signed with debug key (not store-ready)."
          fi
      - name: Analyze
        script: flutter analyze
      - name: Tests
        script: flutter test --no-pub --dart-define=API_BASE=http://127.0.0.1:8081
      - name: Build APK (release)
        script: flutter build apk --release --no-pub --flavor "$FLAVOR" --dart-define=API_BASE="$API_BASE"
      - name: Build App Bundle (release)
        script: flutter build appbundle --release --no-pub --flavor "$FLAVOR" --dart-define=API_BASE="$API_BASE"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/*/*.aab