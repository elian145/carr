# Render Blueprint: use this when creating or updating the web service from the repo.
# See: https://render.com/docs/blueprint-spec
#
# Required: In Render Dashboard → Service → Environment, set:
#   APP_ENV=production
#   SECRET_KEY=<long random string, e.g. openssl rand -hex 32>
#   JWT_SECRET_KEY=<long random string>
#   DATABASE_URL=<postgresql://...>  (or leave unset to use SQLite on ephemeral disk)
#
# Universal / App Links (listing shares → open app):
#   APPLE_TEAM_ID=<10-char Team ID>
#   ANDROID_SHA256_CERT_FINGERPRINTS=<sha256>[,<sha256>...]
services:
  - type: web
    runtime: python
    name: carr
    # Inline command avoids Windows CRLF in .sh files breaking `bash build_render.sh` on Linux (exit 1, no logs).
    # If the dashboard overrides Build Command, paste this same line there.
    buildCommand: echo "=== pip upgrade ===" && pip install --upgrade pip setuptools wheel && echo "=== pip install ===" && pip install --no-cache-dir -r kk/requirements.txt && echo "=== build OK ==="
    startCommand: bash start_render.sh
    healthCheckPath: /health
