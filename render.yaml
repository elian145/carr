# Render Blueprint: use this when creating or updating the web service from the repo.
# See: https://render.com/docs/blueprint-spec
#
# Required: In Render Dashboard → Service → Environment, set:
#   APP_ENV=production
#   SECRET_KEY=<long random string, e.g. openssl rand -hex 32>
#   JWT_SECRET_KEY=<long random string>
#   DATABASE_URL=<postgresql://...>  (or leave unset to use SQLite on ephemeral disk)
services:
  - type: web
    runtime: python
    name: carr
    # Use script so logs show each step; --no-cache-dir avoids filling small build disks.
    buildCommand: bash build_render.sh
    startCommand: bash start_render.sh
    healthCheckPath: /health
