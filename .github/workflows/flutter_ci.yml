name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter version
        run: flutter --version

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.config/dart
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Publish preflight (static)
        run: python scripts/verify_preflight.py --skip-host

      - name: Run tests
        run: flutter test --no-pub --coverage

      - name: Build APK (debug, dev flavor)
        run: flutter build apk --debug --no-pub --flavor dev

      - name: Build App Bundle (prod release, unsigned fallback signing)
        run: |
          flutter build appbundle --release --no-pub --flavor prod \
            --dart-define=API_BASE=https://carr-5hrm.onrender.com


