workflows:
  ios-car-listing-app:
    name: Car Listing App iOS
    max_build_duration: 90
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'revert-exact-6b82de9'
          include: true
          source: true
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        API_BASE: https://carr-5hrm.onrender.com
        LISTING_SHARE_WEB_BASE: https://carr-5hrm.onrender.com
        LISTING_SHARE_URL_PATH: listing
    scripts:
      - name: Print commit used for this build
        script: |
          echo "Building commit: $(git rev-parse HEAD)"
          git log -1 --pretty=oneline
      - name: Force clean Flutter and iOS workspace
        script: |
          set -e
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          rm -rf "$HOME/Library/Developer/Xcode/DerivedData" || true
          flutter pub get
      - name: Set up keychain to be used for codesigning
        script: |
          keychain initialize
      - name: Fetch App Store signing files
        script: |
          app-store-connect fetch-signing-files "com.carzo.app" --type IOS_APP_STORE --create
      - name: Use signing profiles
        script: |
          xcode-project use-profiles
      - name: Install Flutter dependencies
        script: |
          flutter pub get
      - name: Bootstrap iOS build settings
        script: |
          flutter precache --ios
          bash scripts/ios_ci_prepare_unsigned.sh
          # Ensure Generated.xcconfig exists by invoking a config-only iOS build
          flutter build ios --release --no-codesign
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter unit tests
        script: |
          flutter test --dart-define=API_BASE=http://127.0.0.1:8081
      - name: Prepare App Store build metadata
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $CM_BUILD_ID" ios/Runner/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :aps-environment' ios/Runner/Runner.entitlements
      - name: Build iOS app
        script: |
          GIT_SHA=$(git rev-parse --short=8 HEAD)
          flutter build ios --release \
            --dart-define=BUILD_COMMIT_SHA=$GIT_SHA \
            --dart-define=API_BASE=${API_BASE:-} \
            --dart-define=LISTING_SHARE_WEB_BASE=${LISTING_SHARE_WEB_BASE:-$API_BASE} \
            --dart-define=LISTING_SHARE_URL_PATH=${LISTING_SHARE_URL_PATH:-listing}
      - name: Build iOS IPA (App Store)
        script: |
          GIT_SHA=$(git rev-parse --short=8 HEAD)
          flutter build ipa --export-options-plist ios/ExportOptions.plist \
            --dart-define=BUILD_COMMIT_SHA=$GIT_SHA \
            --dart-define=API_BASE=${API_BASE:-} \
            --dart-define=LISTING_SHARE_WEB_BASE=${LISTING_SHARE_WEB_BASE:-$API_BASE} \
            --dart-define=LISTING_SHARE_URL_PATH=${LISTING_SHARE_URL_PATH:-listing}
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
